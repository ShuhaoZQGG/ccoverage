version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ShuhaoZQGG/ccoverage/cmd.version={{.Version}}
      - -X github.com/ShuhaoZQGG/ccoverage/cmd.commit={{.ShortCommit}}
      - -X github.com/ShuhaoZQGG/ccoverage/cmd.date={{.Date}}

release:
  replace_existing_draft: true

archives:
  - format_overrides:
      - goos: windows
        formats: ['zip']

brews:
  - repository:
      owner: ShuhaoZQGG
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ShuhaoZQGG/ccoverage"
    description: "Coverage analysis for Claude Code project configuration"
    license: "MIT"
    install: |
      bin.install "ccoverage"
    test: |
      system "#{bin}/ccoverage", "--version"

changelog:
  sort: asc
  filters:
    include:
      - "^feat"
      - "^fix"
      - "^refactor"
      - "^docs"
      - "^ci"
